<link rel="stylesheet" th:href="@{/css/admin.css}">

<div class="orders-page">

<h2 class="page-title">Orders & Clients</h2>

<div class="toolbar">

<div>

<input
type="text"
class="search"
placeholder="Search client name or phone..."
oninput="searchClients(this.value)">

<button class="filter-btn" onclick="toggleFilter()">Filter</button>

<div id="filterBox" class="filter-box" style="display:none">

<label><input type="radio" name="filter" value="orders"> Most Orders</label>
<label><input type="radio" name="filter" value="recent"> Recently Ordered</label>
<label><input type="radio" name="filter" value="new"> Newly Added</label>
<label><input type="radio" name="filter" value="name"> Name (A-Z)</label>

</div>
</div>

<button class="add-btn" onclick="openNewOrder()">
+ New Order
</button>

</div>

<div id="clientsGrid" class="clients-grid"></div>

</div>


<!-- CLIENT EDIT MODAL -->

<div id="clientEditModal" class="modal">

<div class="modal-box">
    <button 
    class="modal-close"
    onclick="this.closest('.modal').style.display='none'"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>




<h3>Edit Client</h3><br>

<input type="hidden" id="editClientId">


<input id="editClientName" placeholder="Name">


<input id="editClientPhone" placeholder="Phone number">


<input id="editClientEmail" placeholder="Email">


<input id="editClientCity" placeholder="City">

<input id="editClientAddress" placeholder="Address">

<div class="modal-actions">

<button onclick="saveClientEdit()">Save</button>

<button onclick="closeClientEdit()">Cancel</button>

</div>

</div>

</div>

<div id="clientOrdersModal" class="modal">

<div class="modal-box" style="width:900px">

    <!-- HEADER BAR -->
    <div class="modal-header">

        <div class="orders-filter">
<input type="date" id="filterOrderDate" onchange="filterOrders()" title="Order Date">
<input type="date" id="filterDeliveredDate" onchange="filterOrders()" title="Delivered Date">
            <button onclick="clearOrderFilters()">Clear</button>
        </div>

        <button class="modal-close" onclick="this.closest('.modal').style.display='none'">
            ✕
        </button>

    </div>


<div class="orders-header">

    <h3 id="ordersClientName">Client Orders</h3>

    <button onclick="openBulkPayment()" class="pay-all-btn">
        💰 Pay All
    </button>

</div>

<div id="clientSummary" class="client-summary"></div>
<div id="ordersList"></div>

<div class="modal-actions">



</div>

</div>

</div>


<div id="newOrderModal" class="modal">

<div class="modal-box" style="width:500px; position:relative;">

<button 
    class="modal-close"
    onclick="this.closest('.modal').style.display='none'"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>

<h3>Create New Order</h3><br>

<input id="orderClientName" placeholder="Client Name">

<input id="orderClientPhone" placeholder="Phone Number">

<input id="orderClientCity" placeholder="City">

<select id="orderWorkType" required>
    <option value="">Select Work Type</option>
    <option value="LASER_CUT">Laser Work</option>
    <option value="STICKER_WORK">Sticker Work</option>
    <option value="PRINT">Printing / Computer work</option>
    <option value="BANNER_FLEX">Banner / Flex</option>
    <option value="HAND_WORK">Hand Work / Painting </option>
</select>

<!-- MATERIAL -->
<div class="custom-select" id="materialSelectBox">

    <input type="text"
           id="materialSearch"
           placeholder="Search Material..."
           oninput="filterMaterialOptions()"
           onclick="toggleMaterialDropdown()">

    <div class="options" id="materialOptions"></div>

</div>

<!-- TOP LAYER -->
<!-- <div class="inline-field">
    <input type="text" id="topLayerSearch" placeholder="Search Material..." oninput="filterTopLayerOptions()">
    <select id="orderTopLayer">
        <option value="">None</option>
    </select>
</div> -->

<textarea id="orderRemark" placeholder="Other additions..."></textarea>

<!-- DXF -->
<div class="inline-field">
    <span class="file-label" id="dxfLabel">DXF (Optional)</span>
    <input type="file" id="orderDxf">
</div>

<input type="number" id="orderPrice" placeholder="Total Price" required>

<input type="hidden" id="orderAdvance" value="0">

<div class="modal-actions">
    <button onclick="saveOrder()">Save Order</button>
    <button onclick="closeNewOrder()">Cancel</button>
</div>

</div>
</div>

<!-- Payment modal -->

<div id="paymentModal" class="modal">

<div class="modal-box" style="width:420px; position:relative;">

<button 
    class="modal-close"
    onclick="closePayment()"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>

<h3>Make Payment</h3><br>

<input type="hidden" id="payOrderId">
<input type="hidden" id="bulkClientId">

<!-- BALANCE -->
<div id="payBalanceInfo" class="pay-balance"></div>

<div class="upi-field">

    <label class="upi-label">Paying to</label>

    <div class="upi-select-wrapper">
        <select id="upiSelect" onchange="updateUPIQR()" class="upi-select">
            <option value="8431983269@ybl">Shantveeresh Sheelavantar</option>
            <option value="9448231988@ybl">Veeranna Sheelavantar</option>
        </select>
    </div>

</div>

<!-- QR SECTION -->
<div class="qr-section">

    <img id="upiQr" class="qr-img"><br>
    

    <!-- UPI LOGO -->
    <img 
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/UPI_logo.svg/1280px-UPI_logo.svg.png"
        class="upi-logo">

</div>

<label>Amount</label>
<input type="number" id="payAmount" oninput="updateUPIQR()">

<div id="payError" class="pay-error"></div>

<label>Type</label>
<select id="payType">
<option value="UPI">UPI</option>
<option value="CASH">Cash</option>
</select>

<div class="modal-actions">
<button onclick="submitPayment()">Pay</button>
<button onclick="closePayment()">Cancel</button>
</div>

</div>
</div>


<!-- Edit order modal -->

<div id="editOrderModal" class="modal">

<div class="modal-box" style="position:relative; width:500px;">

<button 
    class="modal-close"
    onclick="this.closest('.modal').style.display='none'"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>

<h3>Edit Order</h3><br>

<input type="hidden" id="editOrderId">

<select id="editWorkType" required>
    <option value="">Select Work Type</option>
    <option value="LASER_CUT">Laser Work</option>
    <option value="STICKER_WORK">Sticker Work</option>
    <option value="PRINT">Printing / Computer work</option>
    <option value="BANNER_FLEX">Banner / Flex</option>
    <option value="HAND_WORK">Hand Work / Painting </option>
</select>

<!-- 🔍 MATERIAL -->
<div class="custom-select" id="editMaterialSelectBox">

    <input type="text"
           id="editMaterialSearch"
           placeholder="Search Material..."
           oninput="filterEditMaterialOptions()"
           onclick="toggleEditMaterialDropdown()">

    <div class="options" id="editMaterialOptions"></div>

</div>

<!-- 🔍 TOP LAYER -->
<!-- <div class="inline-field">
    <input type="hidden" id="editTopLayerSearch" placeholder="Search Material..." oninput="filterEditTopLayerOptions()">
    <select id="editTopLayer"></select>
</div> -->

<textarea id="editRemark" placeholder="Other additions..."></textarea>

<!-- DXF -->
<div class="inline-field">
    <span class="file-label">DXF (if Required)</span>
    <input type="file" id="editDxf">
</div>

<input type="number" id="editPrice" placeholder="Total Price">

<input type="number" id="editAdvance" placeholder="Paid Amount">

<input type="date" id="editCreatedAt">

<div class="modal-actions">
    <button onclick="saveOrderEdit()">Save</button>
    <button onclick="closeEditOrder()">Cancel</button>
</div>

</div>
</div>

<div id="imagePreviewModal" class="modal">
<div class="modal-box" style="width:500px">
            <button 
    class="modal-close"
    onclick="this.closest('.modal').style.display='none'"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>

<img id="previewImg" style="width:100%">



</div>
</div>

<div id="paymentHistoryModal" class="modal">

<div class="modal-box" style="width:700px; position:relative;">

<button 
    class="modal-close"
    onclick="closePaymentHistory()"
    style="position:absolute; top:12px; right:12px;">
    ✕
</button>

<h3>Payment History</h3>

<div id="paymentHistoryList" class="table-card"></div>

</div>
</div>
