<link rel="stylesheet" th:href="@{/css/admin.css}">

<div class="orders-page">

<h2 class="page-title">Orders & Clients</h2>

<div class="toolbar">

<input
type="text"
class="search"
placeholder="Search client name or phone..."
oninput="searchClients(this.value)">

<button class="filter-btn">Filter</button>

<button class="add-btn" onclick="openNewOrder()">
+ New Order
</button>

</div>

<div id="clientsGrid" class="clients-grid"></div>

</div>


<!-- CLIENT EDIT MODAL -->

<div id="clientEditModal" class="modal">

<div class="modal-box">

<h3>Edit Client</h3>

<input type="hidden" id="editClientId">

<label>Name</label>
<input id="editClientName">

<label>Phone</label>
<input id="editClientPhone">

<label>Email</label>
<input id="editClientEmail">d

<label>City</label>
<input id="editClientCity">

<label>Address</label>
<input id="editClientAddress">

<div class="modal-actions">

<button onclick="saveClientEdit()">Save</button>

<button onclick="closeClientEdit()">Cancel</button>

</div>

</div>

</div>

<div id="clientOrdersModal" class="modal">

<div class="modal-box" style="width:900px">

<h3 id="ordersClientName">Client Orders</h3>

<div id="ordersList"></div>

<div class="modal-actions">

<button onclick="closeOrders()">Close</button>

</div>

</div>

</div>


<div id="newOrderModal" class="modal">

<div class="modal-box" style="width:500px">

<h3>Create New Order</h3>

<label>Client Name</label>
<input id="orderClientName">

<label>Phone</label>
<input id="orderClientPhone">

<label>City</label>
<input id="orderClientCity">

<label>Work Type</label>

<select id="orderWorkType">
<option value="LASER_CUT">Laser Cut</option>
<option value="LASER_ENGRAVE">Laser Engrave</option>
</select>

<label>Material</label>
<select id="orderMaterial"></select>

<label>Top Layer</label>
<select id="orderTopLayer">
<option value="">None</option>
</select>

<label>DXF File</label>
<input type="file" id="orderDxf">

<label>Total Price</label>
<input type="number" id="orderPrice">

<label>Advance Paid</label>
<input type="number" id="orderAdvance">

<div class="modal-actions">

<button onclick="saveOrder()">Save Order</button>

<button onclick="closeNewOrder()">Cancel</button>

</div>

</div>

</div>

<div id="paymentModal" class="modal">

<div class="modal-box">

<h3>Make Payment</h3>

<input type="hidden" id="payOrderId">

<!-- 🔥 NEW -->
<div id="payBalanceInfo" style="margin-bottom:10px;font-weight:600;"></div>

<label>Amount</label>
<input type="number" id="payAmount" value="">

<!-- 🔥 NEW -->
<div id="payError" style="color:red;font-size:12px;margin-bottom:10px;"></div>

<label>Type</label>
<select id="payType">
<option value="UPI">UPI</option>
<option value="CASH">Cash</option>
</select>

<div class="modal-actions">
<button onclick="submitPayment()">Pay</button>
<button onclick="closePayment()">Cancel</button>
</div>

</div>
</div>

<div id="editOrderModal" class="modal">

<div class="modal-box">

<h3>Edit Order</h3>

<input type="hidden" id="editOrderId">

<label>Work Type</label>
<select id="editWorkType">
<option value="LASER_CUT">Laser Cut</option>
<option value="LASER_ENGRAVE">Laser Engrave</option>
</select>

<label>Material</label>
<select id="editMaterial"></select>

<label>Top Layer</label>
<select id="editTopLayer"></select>

<label>Replace DXF</label>
<input type="file" id="editDxf">

<label>Price</label>
<input type="number" id="editPrice">

<label>Advance</label>
<input type="number" id="editAdvance">

<div class="modal-actions">

<button onclick="saveOrderEdit()">Save</button>
<button onclick="closeEditOrder()">Cancel</button>

</div>

</div>

</div>

<div id="imagePreviewModal" class="modal">
<div class="modal-box" style="width:500px">

<img id="previewImg" style="width:100%">

<div class="modal-actions">
<button onclick="closePreview()">Close</button>
</div>

</div>
</div>
