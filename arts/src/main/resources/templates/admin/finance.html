<h2 class="page-title">Finance Dashboard</h2>

<!-- SECTION 1 -->
<div class="finance-grid">

<div class="card" id="totalOrders" style="margin: 10px 0;"></div>
<div class="card" id="inProgress" style="margin: 10px 0;"></div>
<div class="card" id="completed" style="margin: 10px 0;"></div>
<div class="card" id="delivered" style="margin: 10px 0;"></div>



</div>

<!-- SECTION 2 -->
<div class="finance-grid">

<div class="card" style="margin: 10px 0;">
    <input type="date" id="dayPicker" onchange="onDayChange()">
    <div id="todayRevenue"></div>
</div>

<div class="card" style="margin: 10px 0;">
    <input type="month" id="monthPicker" onchange="onMonthChange()">
    <div id="monthlyRevenue"></div>
</div>

<div class="card" style="margin: 10px 0;">
    <select id="yearPicker" onchange="onYearChange()"></select>
    <div id="yearlyRevenue"></div>
</div>

</div>

<!-- SECTION 3 -->
<div class="finance-grid">

<div class="card" id="grossRevenue" style="margin: 10px 0;"></div>

<div class="card" id="totalExpenses" style="margin: 10px 0;"></div>

<div class="card" id="profitStatus" style="margin: 10px 0;"></div>

</div>



<div class="card" style="margin: 10px 0;">

<div class="chart-controls">
    <button onclick="loadDaily()" class="chart-btn">Daily</button>
    <button onclick="loadMonthly()" class="chart-btn">Monthly</button>
    <button onclick="loadYearly()" class="chart-btn">Yearly</button>
</div>


<!-- SECTION 4 -->
<div class="card">
<canvas id="financeChart"></canvas>
</div>
</div>
