
<div class="expenses-page">

<style>
/* ===== EXPENSE PAGE ONLY ===== */

.expenses-page .exp-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.expenses-page .exp-actions{
    display:flex;
    gap:10px;
}

/* BUTTON */
.expenses-page .exp-btn{
    background:#2563eb;
    color:white;
    padding:8px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.expenses-page .exp-btn:hover{
    background:#1e4fd1;
}

/* TABLE */
.expenses-page .exp-table{
    width:100%;
    border-collapse:collapse;
}

.expenses-page .exp-table th{
    background:#f1f5f9;
    padding:10px;
    text-align:left;
}

.expenses-page .exp-table td{
    padding:10px;
    border-bottom:1px solid #eee;
}

/* TYPE COLORS */
.expenses-page .type-material{
    color:#2563eb;
    font-weight:600;
}

.expenses-page .type-bill{
    color:#e67e22;
    font-weight:600;
}

.expenses-page .type-pigmy{
    color:#22c55e;
    font-weight:600;
}

/* MODAL (SAFE VERSION) */
.expenses-page .exp-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

.expenses-page .exp-modal-box{
    background:white;
    padding:20px;
    width:350px;
    border-radius:10px;
}

/* INPUTS */
.expenses-page input,
.expenses-page select,
.expenses-page textarea{
    width:100%;
    margin-bottom:10px;
    padding:8px;
    border:1px solid #ddd;
    border-radius:6px;
}
</style>

<div class="exp-header">

    <h2>Expenses</h2>

    <div class="exp-actions">
        <button onclick="openForm()" class="exp-btn">+ Add Entry</button>

        <select id="filterType" onchange="loadExpenses()">
            <option value="">All</option>
            <option value="MATERIAL">Material</option>
            <option value="BILL">Bills</option>
            <option value="PIGMY">Pigmy</option>
        </select>
    </div>

</div>

<div class="table-card">
<table class="exp-table">
<thead>
<tr>
<th>Date</th>
<th>Title</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>File</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>
</div>

<div id="expenseModal" class="exp-modal">

<div class="exp-modal-box">

<h3>Add Entry</h3>

<select id="type">
    <option value="MATERIAL">Material</option>
    <option value="BILL">Bill</option>
    <option value="PIGMY">Pigmy</option>
</select>

<input id="title" placeholder="Title">
<input id="category" placeholder="Category">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<textarea id="note"></textarea>

<input id="file" type="file">

<div style="display:flex; justify-content:flex-end; gap:10px;">
    <button onclick="saveExpense()" class="exp-btn">Save</button>
    <button onclick="closeForm()">Cancel</button>
</div>

</div>
</div>

</div>
