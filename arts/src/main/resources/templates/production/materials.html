<link rel="stylesheet" href="/css/admin.css">
<h2 class="page-title">Material Inventory</h2>

<div class="toolbar">

<input
type="text"
class="search"
placeholder="Search material..."
oninput="searchMaterial(this.value)">

<button class="add-btn" onclick="openAddMaterial()">
+ Add Material
</button>

</div>

<div class="materials-card">
    <div class="materials-header">Material Tree</div>
    <div id="materialsContainer" class="materials-list"></div>
</div>


<!-- ADD MATERIAL MODAL -->

<div id="addMaterialModal" class="modal">

<div class="modal-content">

<h3>Add Material</h3>

<label>Material Name</label>
<input id="newMaterialName">

<label>Parent Material</label>
<select id="parentMaterialDropdown">
<option value="">Root</option>
</select>

<label>Stock (only for leaf)</label>
<input type="number" id="newMaterialStock">

<div class="modal-actions">
<button onclick="saveMaterial()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>

</div>

</div>

<div id="materialModal" class="modal">

<div class="modal-box">

<h3>Add Material</h3>

<input id="materialName" placeholder="Material name">

<select id="materialParent"></select>

<select id="materialStock">
<option value="IN_STOCK">🟢 In Stock</option>
<option value="LOW_STOCK">🟡 Low Stock</option>
<option value="OUT_OF_STOCK">🔴 Out of Stock</option>
</select>

<div class="modal-actions">
<button onclick="saveMaterial()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>

</div>

</div>

<div id="editModal" class="modal">

<div class="modal-box">

<h3>Edit Material</h3>

<input type="hidden" id="editMaterialId">

<input id="editMaterialName">

<select id="editMaterialStock">
<option value="IN_STOCK">🟢 In Stock</option>
<option value="LOW_STOCK">🟡 Low Stock</option>
<option value="OUT_OF_STOCK">🔴 Out of Stock</option>
</select>

<div class="modal-actions">
<button onclick="saveEdit()">Save</button>
<button onclick="closeEdit()">Cancel</button>
</div>

</div>

</div>
